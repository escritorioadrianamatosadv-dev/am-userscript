name: Auto Bump Version

on:
  push:
    branches: [main]
    paths:
      - 'script.user.js'

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump @version
        run: |
          FILE="script.user.js"
          OLD=$(grep -oP '(?<=@version\s{1,10})[\d.]+' "$FILE" | head -1)
          echo "Versão atual: $OLD"
          if [ -z "$OLD" ]; then echo "ERRO: @version não encontrado"; exit 1; fi
          NEW=$(echo $OLD | awk -F. '{$NF=$NF+1; print}' OFS='.')
          echo "Nova versão: $NEW"
          sed -i "s/@version\s*$OLD/@version $NEW/" "$FILE"

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add script.user.js
          git diff --cached --quiet && echo "Nada pra commitar" && exit 0
          git commit -m "chore: bump version [skip ci]"
          git push
